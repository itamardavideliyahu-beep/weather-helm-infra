{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "weather-backend.fullname" . }}
  labels:
    {{- include "weather-backend.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "weather-backend.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
